---
# wg-gesucht Karlsruhe alert bot — search configuration.
#
# Non-secret and safe to commit publicly. Messages are sent by run.py using the
# Telegram bot token + chat id that the GitHub Actions workflow injects from
# encrypted secrets (FLATHUNTER_TELEGRAM_BOT_TOKEN / FLATHUNTER_TELEGRAM_RECEIVER_IDS).

# What to watch. wg-gesucht URL pattern:
#   <type>-in-Karlsruhe.68.<category>.1.0.html   (68 = Karlsruhe city id)
#   category 0 = WG room, 1 = 1-room apartment, 2 = apartment, 3 = house
urls:
    # WG rooms (shared flats)
    - https://www.wg-gesucht.de/wg-zimmer-in-Karlsruhe.68.0.1.0.html
    # 1-room apartments (studio / 1-Zimmer-Wohnung, mini kitchen + bath)
    - https://www.wg-gesucht.de/1-zimmer-wohnungen-in-Karlsruhe.68.1.1.0.html
    # Apartments (Wohnung, any room count)
    - https://www.wg-gesucht.de/wohnungen-in-Karlsruhe.68.2.1.0.html

# Listings outside these limits are dropped before notifying. Tune freely.
filters:
    max_price: 600
    # Optional extras — uncomment to use:
    # min_size: 15
    # excluded_titles:
    #   - "(?i)tausch"         # hide swap ("Tausch") offers
    #   - "(?i)zwischenmiete"  # hide short-term sublets
