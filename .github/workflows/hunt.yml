name: wg-gesucht hunt

on:
  schedule:
    # ~every 10 minutes (UTC). GitHub frequently delays scheduled runs under
    # load, so treat this as "roughly every 10-20 min", not exact.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      prime:
        description: "Prime DB silently (record current listings, send NO Telegram messages)"
        type: boolean
        default: false

# Never run two hunts at once, so the state-commit step can't race itself.
concurrency:
  group: wg-hunt
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit processed_ids.db back to the repo

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (config + seen-listings state)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-fh-${{ github.run_id }}
          restore-keys: pip-fh-

      - name: Clone Flathunter
        run: git clone --depth 1 https://github.com/flathunters/flathunter.git "$RUNNER_TEMP/flathunter"

      - name: Install Flathunter dependencies
        working-directory: ${{ runner.temp }}/flathunter
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv sync

      - name: Hunt
        working-directory: ${{ runner.temp }}/flathunter
        env:
          FLATHUNTER_DATABASE_LOCATION: ${{ github.workspace }}
          PRIME: ${{ github.event.inputs.prime }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_RECEIVER_IDS: ${{ secrets.TELEGRAM_RECEIVER_IDS }}
        run: |
          if [ "$PRIME" = "true" ]; then
            echo "::notice::PRIME mode — recording current listings, NO notifications"
          else
            export FLATHUNTER_NOTIFIERS="telegram"
            export FLATHUNTER_TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN"
            export FLATHUNTER_TELEGRAM_RECEIVER_IDS="$TELEGRAM_RECEIVER_IDS"
          fi
          pipenv run python flathunt.py -c "$GITHUB_WORKSPACE/config.yaml"

      - name: Commit updated seen-listings
        run: |
          cd "$GITHUB_WORKSPACE"
          if [ ! -f processed_ids.db ]; then
            echo "No processed_ids.db produced (crawl likely failed) — nothing to commit."
            exit 0
          fi
          git config user.name "wg-bot"
          git config user.email "actions@users.noreply.github.com"
          git add processed_ids.db
          if git diff --cached --quiet; then
            echo "No new listings → state unchanged."
          else
            git commit -m "chore: update seen listings [skip ci]"
            git push
          fi
